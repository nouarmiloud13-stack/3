# docker-compose.yml — Environnement de développement Nouarmiloud IoT avec ngrok
# Emplacement : docker/docker-compose.yml
# Usage : depuis la racine du projet → make start
#         ou manuellement → docker compose -f docker/docker-compose.yml up -d
#
# ⚠️  MQTT plain (port 1883) — réseau Docker interne uniquement.
#     MQTT TLS  (port 8883) — connexions externes chiffrées.
#     ngrok expose uniquement l'API REST + Dashboard (port 5000) via HTTPS.
#
# MODES :
#   make start-local      → PUBLIC_URL=http://localhost:5000  (sans internet)
#   make start-codespaces → PUBLIC_URL=https://<ngrok-domain> (tunnel HTTPS)
#
# PUBLIC_URL est injecté par le Makefile via variable d'environnement shell.
# Fallback automatique vers http://localhost:5000 si non défini.
#
# IMPORTANT : tous les chemins relatifs sont exprimés par rapport à ce fichier
# (docker/), donc "../" remonte à la racine projet.

services:

  # ── Mosquitto MQTT Broker ────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: gnl_mosquitto
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /mosquitto/data /mosquitto/log
        mosquitto_passwd -c -b /mosquitto/data/passwd \
          "$${MQTT_USER_PUBLISHER}" "$${MQTT_PASS_PUBLISHER}"
        mosquitto_passwd    -b /mosquitto/data/passwd \
          "$${MQTT_USER_DASHBOARD}" "$${MQTT_PASS_DASHBOARD}"
        mosquitto_passwd    -b /mosquitto/data/passwd \
          "$${MQTT_USER_ADMIN}" "$${MQTT_PASS_ADMIN}"
        chmod 600 /mosquitto/data/passwd
        chown mosquitto:mosquitto /mosquitto/data/passwd
        echo "[mosquitto] passwd créé dans /mosquitto/data/passwd"
        exec mosquitto -c /mosquitto/config/mosquitto.conf

    env_file:
      - ../.env

    ports:
      - "1883:1883"
      - "8883:8883"    # ← port TLS externe

    volumes:
      - ../raspberry_pi/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../raspberry_pi/mqtt/acl:/mosquitto/config/acl:ro
      - ../docker/certs:/mosquitto/certs:ro    # ← certificats TLS
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

    networks:
      - gnl_net

    restart: unless-stopped

    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          mosquitto_sub
          -h localhost
          -p 1883
          -u nouar
          -P "hamel"
          -t '$$SYS/broker/uptime'
          -C 1
          --quiet
          -W 5
          2>/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── MongoDB — Historique GNL ─────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: gnl_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE:      gnl_history
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - gnl_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Mongo-Express — Interface web MongoDB ────────────────────────────────────
  mongo_express:
    image: mongo-express:1.0.2
    container_name: gnl_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS}
      ME_CONFIG_MONGODB_URL:           mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME:    nouar
      ME_CONFIG_BASICAUTH_PASSWORD:    hamel
      ME_CONFIG_MONGODB_ENABLE_ADMIN:  "true"
      ME_CONFIG_SITE_BASEURL:          /
    networks:
      - gnl_net
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── API REST + Edge AI ────────────────────────────────────────────────────────
  gnl_edge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.edge
    image: gnl_edge_node
    container_name: gnl_edge_node
    ports:
      - "5000:5000"
    environment:
      MQTT_HOST:           mosquitto
      MQTT_PORT:           "1883"
      MQTT_USER_PUBLISHER: nouar
      MQTT_PASS_PUBLISHER: "hamel"
      GNL_JWT_SECRET:      hamel
      JWT_EXPIRY_S:        "3600"
      API_TIMEOUT_S:       "3600"
      SERIAL_PORT:         SIMULATED
      # ── PUBLIC_URL ─────────────────────────────────────────────────────────
      # Injecté par le Makefile avant docker compose :
      #   make start-local      → PUBLIC_URL=http://localhost:5000
      #   make start-codespaces → PUBLIC_URL=https://<ngrok-domain>
      # Fallback automatique si la variable est absente de l'environnement shell.
      PUBLIC_URL:          ${PUBLIC_URL:-http://localhost:5000}
      GNL_AI_PROVIDER:     ${GNL_AI_PROVIDER:-gemma4}
      GEMMA4_HOST:         gemma4
      GEMMA4_SERVER_PORT:  "8080"
      GEMMA4_TIMEOUT:      ${GEMMA4_TIMEOUT:-45}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY:-}
      GNL_AI_MODEL:        ${GNL_AI_MODEL:-claude-haiku-4-5-20251001}
      GNL_AI_INTERVAL:     ${GNL_AI_INTERVAL:-30}
      GNL_AI_RISK_TRIGGER: ${GNL_AI_RISK_TRIGGER:-60}
      GNL_AI_MAX_TOKENS:   ${GNL_AI_MAX_TOKENS:-512}
      MONGO_URI:  mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/
      MONGO_DB:   gnl_history
      MONGO_TTL_DAYS: ${MONGO_TTL_DAYS:-30}
      WATCHDOG_TIMEOUT_S:       ${WATCHDOG_TIMEOUT_S:-30}
      WATCHDOG_MAX_ERRORS:      ${WATCHDOG_MAX_ERRORS:-10}
      WATCHDOG_TICK_S:          ${WATCHDOG_TICK_S:-2.0}
      WATCHDOG_OS_SHUTDOWN:     ${WATCHDOG_OS_SHUTDOWN:-false}
      WATCHDOG_SENSORS_DEAD_MAX: ${WATCHDOG_SENSORS_DEAD_MAX:-5}
      ESD_ACK_TIMEOUT_S:        ${ESD_ACK_TIMEOUT_S:-10}
      GAS_WARN:     ${GAS_WARN:-250}
      GAS_DANGER:   ${GAS_DANGER:-450}
      LEVEL_HIGH:   ${LEVEL_HIGH:-95}
      LEVEL_LOW:    ${LEVEL_LOW:-10}
      CONFIRM_GAS:  ${CONFIRM_GAS:-3}
    volumes:
      - ../raspberry_pi:/opt/gnl:ro
      - gnl_logs:/var/log/gnl
    networks:
      - gnl_net
    depends_on:
      mosquitto:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Gemma4 E2B — Serveur llama.cpp (build depuis source avec support audio) ──
  #
  #   CHANGEMENTS v2 (STT) :
  #     • image: ghcr.io/...  →  build: docker/Dockerfile.gemma4
  #       (binaire compilé avec libsndfile1-dev pour /v1/audio/transcriptions)
  #     • Ajout de --mmproj /models/${GEMMA4_MMPROJ_FILE}
  #       (requis pour le mode multimodal audio/image de Gemma4 E2B)
  #
  gemma4:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gemma4
    container_name: gnl_gemma4
    profiles:
      - ai
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ../docker/models/gemma4:/models:ro
    command: >
      --model /models/${GEMMA4_MODEL_FILE}
      --mmproj /models/${GEMMA4_MMPROJ_FILE}
      --ctx-size ${GEMMA4_CTX:-4096}
      --threads ${GEMMA4_THREADS:-4}
      --n-gpu-layers ${GEMMA4_GPU_LAYERS:-0}
      --host 0.0.0.0
      --port 8080
      --log-disable
    networks:
      - gnl_net
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 5G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # llama.cpp charge model (~3.5 GB) + mmproj au démarrage — prévoir 120s
      start_period: 120s

  # ── ngrok — Tunnel HTTPS ─────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: gnl_ngrok
    profiles:
      - ngrok
    command:
      - "http"
      - "--domain=${NGROK_DOMAIN}"
      - "gnl_edge_node:5000"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    networks:
      - gnl_net
    depends_on:
      gnl_edge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4040/api/tunnels || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mosquitto_data:
  mosquitto_log:
  gnl_logs:
  mongodb_data:

networks:
  gnl_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
